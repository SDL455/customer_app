name: foodpanda_app
description: "FoodPanda-style delivery app (Customer / Merchant / Rider) built with Flutter, GetX & Firebase."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ==========================================================
  # 1. State Management & Local Storage
  # ==========================================================
  get: ^4.6.6
  get_storage: ^2.1.1

  # ==========================================================
  # 2. Firebase Services
  # ==========================================================
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # ==========================================================
  # 3. Networking & Utilities
  # ==========================================================
  dio: ^5.4.0
  connectivity_plus: ^7.2.0
  collection: ^1.18.0
  logger: ^2.7.0
  equatable: ^2.0.8
  dartz: ^0.10.1

  # ==========================================================
  # 4. Maps & Location
  # ==========================================================
  google_maps_flutter: ^2.6.0
  geolocator: ^13.0.0
  flutter_polyline_points: ^2.1.0

  # ==========================================================
  # 5. Local Storage & Security
  # ==========================================================
  flutter_secure_storage: ^9.0.0

  # ==========================================================
  # 6. UI & UX / Design / Animations
  # ==========================================================
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  intl: ^0.19.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  responsive_framework: ^1.5.1

  # ==========================================================
  # 7. Hardware & Communication
  # ==========================================================
  url_launcher: ^6.3.0
  permission_handler: ^11.0.0
  image_picker: ^1.0.0
  file_picker: ^8.0.0

  # ==========================================================
  # Additional useful packages
  # ==========================================================
  pull_to_refresh: ^2.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  syncfusion_flutter_charts: ^25.1.0
  fl_chart: ^0.68.0
  dropdown_button2: ^2.3.9
  flutter_staggered_grid_view: ^0.7.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  confetti: ^0.8.0
  pinput: ^6.0.2
  flutter_local_notifications: ^22.0.1
  google_fonts: ^8.1.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "path/to/image.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "path/to/image.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "path/to/image.png"
flutter:
  uses-material-design: true
  # Fonts are loaded via the google_fonts package at runtime, so no static
  # font assets are required. If you prefer bundled fonts, drop .ttf files in
  # assets/fonts/ and uncomment the fonts block in this file.
  assets:
    - assets/images/
